finetuning:
  dataset: "geosignal"
  max_steps: 2000
  learning_rate: 2e-4
  warmup_steps: 100
  batch_size: 4
  gradient_accumulation: 4
  max_seq_length: 1024
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"

  lora_standard:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    lora_dropout: 0.05

  lora_selective:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj"]
    freeze_bottom_layers_pct: 0.75
    lora_dropout: 0.05

  lora_replay:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    replay_ratio: 0.5
    replay_dataset: "tatsu-lab/alpaca"

  mix_cpt:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    lssd_alpha: 0.3

evaluation:
  geobench:
    closed_tasks: ["true_false", "multiple_choice"]
    open_tasks: ["factual_qa", "reasoning"]
    judge_model: "Qwen/Qwen2.5-3B-Instruct"
    judge_criteria: ["prompt_alignment", "correctness", "answer_relevance"]

  physgeo:
    criteria:
      - unit_consistency
      - spatiotemporal_coherence
      - conservation_laws
      - stratigraphic_plausibility
      - causal_correctness
      - no_physical_hallucinations
    max_score_per_criterion: 1.0
    eval_set_size: 120

seeds: [42, 123, 456]
